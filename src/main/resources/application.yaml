spring:
  application:
    name: crypto-system
  datasource:
    url: jdbc:h2:mem:crypto;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

crypto:
  price-aggregation:
    interval-ms: 10000
    binance-url: https://api.binance.com/api/v3/ticker/bookTicker
    huobi-url: https://api.huobi.pro/market/tickers
