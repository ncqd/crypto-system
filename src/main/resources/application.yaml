spring:
  application:
    name: crypto-system
  datasource:
    url: jdbc:h2:mem:crypto;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.project.crypto.scheduler.PriceAggregationScheduler: INFO
    com.project.crypto.service.PriceAggregationService: INFO
    com.project.crypto.service.TradingService: INFO
    com.project.crypto.service.LimitOrderService: INFO
    com.project.crypto.service.LimitOrderMatcher: INFO
    com.project.crypto.service.TradeHistoryService: INFO
    com.project.crypto.controller.TradeController: INFO

crypto:
  auth:
    jwt-secret: crypto-system-dev-secret-change-in-production-min-32-chars
    jwt-expiration-ms: 86400000
  wallet:
    initial-usdt-balance: 50000.00000000
  price-aggregation:
    use-external-feeds: true
    interval-ms: 2000
    max-price-age-ms: 30000
    cache-ttl-ms: 2000
    binance-url: https://api.binance.com/api/v3/ticker/bookTicker
    huobi-url: https://api.huobi.pro/market/tickers
  market:
    primary:
      ETHUSDT:
        bid: 2000.00000000
        ask: 2001.00000000
      BTCUSDT:
        bid: 70000.00000000
        ask: 70010.00000000
    secondary:
      ETHUSDT:
        bid: 2000.50000000
        ask: 2000.80000000
      BTCUSDT:
        bid: 69990.00000000
        ask: 70005.00000000
